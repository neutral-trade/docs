<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1990 480" preserveAspectRatio="xMidYMid slice">
  <rect width="1990" height="480" fill="#0F1117"/>

  <!-- Faint vertical centerline -->
  <line x1="995" y1="100" x2="995" y2="440" stroke="#FFFFFF" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 8"/>

  <!-- Baseline -->
  <line x1="120" y1="320" x2="1870" y2="320" stroke="#FFFFFF" stroke-width="0.8" opacity="0.30"/>

  <!-- Tick marks along baseline (matching Earn) -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.20">
    <line x1="360" y1="316" x2="360" y2="324"/>
    <line x1="600" y1="316" x2="600" y2="324"/>
    <line x1="840" y1="316" x2="840" y2="324"/>
    <line x1="1080" y1="316" x2="1080" y2="324"/>
    <line x1="1320" y1="316" x2="1320" y2="324"/>
    <line x1="1560" y1="316" x2="1560" y2="324"/>
    <line x1="1800" y1="316" x2="1800" y2="324"/>
  </g>

  <!-- Upper curve (long position) - left half -->
  <path d="M 240 320 C 400 130, 760 130, 920 320" fill="none" stroke="#FE5A19" stroke-width="2.5"/>
  <circle cx="240" cy="320" r="5" fill="#FE5A19"/>
  <circle cx="920" cy="320" r="5" fill="#FE5A19"/>

  <!-- Lower curve (short position) - right half, mirror -->
  <path d="M 1070 320 C 1230 510, 1590 510, 1750 320" fill="none" stroke="#FF9B15" stroke-width="2.5" opacity="0.85"/>
  <circle cx="1070" cy="320" r="5" fill="#FF9B15"/>
  <circle cx="1750" cy="320" r="5" fill="#FF9B15"/>
</svg>
