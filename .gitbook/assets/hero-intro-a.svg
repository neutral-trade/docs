<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1990 480" preserveAspectRatio="xMidYMid slice">
  <rect width="1990" height="480" fill="#0F1117"/>

  <!-- Baseline at vertical center -->
  <line x1="120" y1="240" x2="1870" y2="240" stroke="#FFFFFF" stroke-width="0.8" opacity="0.30"/>

  <!-- Tick marks -->
  <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.20">
    <line x1="360" y1="236" x2="360" y2="244"/>
    <line x1="600" y1="236" x2="600" y2="244"/>
    <line x1="840" y1="236" x2="840" y2="244"/>
    <line x1="1080" y1="236" x2="1080" y2="244"/>
    <line x1="1320" y1="236" x2="1320" y2="244"/>
    <line x1="1560" y1="236" x2="1560" y2="244"/>
    <line x1="1800" y1="236" x2="1800" y2="244"/>
  </g>

  <!-- Layer 1: Market-neutral-style oscillation (faint background) -->
  <path d="M 200 240 C 380 140, 740 140, 920 240 C 1100 340, 1460 340, 1640 240" fill="none" stroke="#FE5A19" stroke-width="1.4" opacity="0.35"/>

  <!-- Layer 2: Directional noise (faint mid layer) -->
  <polyline points="200,260 290,200 360,290 450,180 540,260 630,210 720,290 810,150 900,260 990,200 1080,290 1170,170 1260,250 1350,140 1440,240 1530,110 1620,230 1710,90 1790,200" fill="none" stroke="#888888" stroke-width="0.9" opacity="0.35"/>

  <!-- Layer 3: Earn-style smooth growth curve (prominent foreground - the system's output) -->
  <path d="M 200 240 Q 700 230, 1100 160 T 1790 50" fill="none" stroke="#FE5A19" stroke-width="2.5"/>
  <path d="M 200 240 Q 700 230, 1100 160 T 1790 50 L 1790 240 Z" fill="#FE5A19" opacity="0.05"/>

  <!-- Endpoints on the foreground curve -->
  <circle cx="200" cy="240" r="5" fill="#FE5A19"/>
  <circle cx="1790" cy="50" r="5" fill="#FE5A19"/>
</svg>
